
services:
  # ============================================================================
  # TBFusionAI API Service
  # ============================================================================
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: tbfusionai-api
    image: tbfusionai:latest
    ports:
      - "8000:8000"
    volumes:
      # Mount artifacts directory for persistence
      - ../artifacts:/app/artifacts
      # Mount frontend for development
      - ../frontend:/app/frontend
      # Mount source code for development (optional)
      # - ../src:/app/src
    environment:
      - ENVIRONMENT=production
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - API_WORKERS=4
      - API_RELOAD=false
      - LOG_LEVEL=INFO
    env_file:
      - ../.env
    networks:
      - tbfusionai-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

