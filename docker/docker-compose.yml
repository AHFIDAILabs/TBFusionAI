services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: tbfusionai-api
    image: tbfusionai:latest
    ports:
      - "8000:8000"
    volumes:
      # Persist trained models and logs across rebuilds
      - ../artifacts:/app/artifacts
      # Mount frontend so HTML/CSS/JS changes don't require a rebuild
      - ../frontend:/app/frontend
    environment:
      - APP_HOME=/app
      - ENVIRONMENT=production
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - PORT=8000
      - API_WORKERS=4
      - API_RELOAD=false
      - LOG_LEVEL=INFO
    env_file:
      - ../.env
    networks:
      - tbfusionai-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  tbfusionai-network:
    driver: bridge

volumes:
  artifacts-data:
