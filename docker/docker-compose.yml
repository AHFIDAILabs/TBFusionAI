services:
  db:
    image: postgis/postgis:15-3.4
    container_name: tbfusionai-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tbfusionai
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - tbfusionai-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: tbfusionai-api
    image: tbfusionai:latest
    ports:
      - "8000:8000"
    volumes:
      # Persist trained models and logs across rebuilds
      - ../artifacts:/app/artifacts
      # Mount frontend so HTML/CSS/JS changes don't require a rebuild
      - ../frontend:/app/frontend
    environment:
      - APP_HOME=/app
      - ENVIRONMENT=production
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - PORT=8000
      - API_WORKERS=4
      - API_RELOAD=false
      - LOG_LEVEL=INFO
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/tbfusionai
    env_file:
      - ../.env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - tbfusionai-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  tbfusionai-network:
    driver: bridge

volumes:
  postgres-data:
  artifacts-data:
